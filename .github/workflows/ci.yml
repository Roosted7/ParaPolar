name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    # Deploys to Cloudflare on pushes to main, once CI passes.
    # Opt-in: set the repository VARIABLE CF_DEPLOY=enabled AND the secret
    # CLOUDFLARE_API_TOKEN (a token from the "Edit Cloudflare Workers"
    # template — the analytics read token cannot deploy). Until then this
    # job is skipped and deploys happen manually via `npm run deploy`.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.CF_DEPLOY == 'enabled'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler deploy --env=""
