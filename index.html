  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <title>ParaPolar — Paraglider Polar & Speed‑to‑Fly Visualizer</title>
    <meta name="description" content="Interactive paraglider polar curve and speed‑to‑fly visualizer. Explore best glide, MacCready, wind and lift effects across glider classes." />
    <meta name="keywords" content="paragliding, polar curve, speed to fly, glide ratio, MacCready, headwind, sink, lift, EN-A, EN-B, EN-C, tandem" />
    <meta property="og:title" content="ParaPolar — Paraglider Polar & Speed‑to‑Fly Visualizer" />
    <meta property="og:description" content="Interactive paraglider polar and ground‑track visualization. Learn speed‑to‑fly with wind and lift shifts." />

    <meta property="og:url" content="https://parapolar.com/" />

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Apply saved theme ASAP to avoid FOUC; persist manual overrides.
      // ?theme=light|dark overrides (used by embeds and screenshot tooling).
      try {
        const themeParam = new URLSearchParams(location.search).get('theme');
        const saved = localStorage.getItem('pp_dark');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const dark = themeParam ? themeParam === 'dark' : saved === 'true' || (saved == null && prefersDark);
        if (dark) document.documentElement.classList.add('dark');
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
