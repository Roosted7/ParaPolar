name = "parapolar"
main = "worker/index.ts"
compatibility_date = "2026-07-01"

# Static SPA build served via Workers Assets.
# run_worker_first is required so the language-domain redirects in the worker
# execute before an asset (e.g. "/" -> index.html) would be served directly.
[assets]
directory = "./dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

routes = [
  { pattern = "parapolar.com/*", zone_name = "parapolar.com" },
  { pattern = "www.parapolar.com/*", zone_name = "parapolar.com" },
  { pattern = "parapolar.fr/*", zone_name = "parapolar.fr" },
  { pattern = "www.parapolar.fr/*", zone_name = "parapolar.fr" },
  { pattern = "parapolar.de/*", zone_name = "parapolar.de" },
  { pattern = "www.parapolar.de/*", zone_name = "parapolar.de" },
  { pattern = "parapolar.nl/*", zone_name = "parapolar.nl" },
  { pattern = "www.parapolar.nl/*", zone_name = "parapolar.nl" }
]

[env.dev]
workers_dev = true
